services:
  telemt:
    image: ghcr.io/telemt/telemt:latest
    container_name: telemt_server
    command: ["/app/telemt", "/etc/telemt/config.toml"]
    restart: unless-stopped
    ports:
      - "443:443"
      - "9095:9091"
    volumes:
      - ./telemt_config:/etc/telemt:rw # Монтируем всю папку с правами на запись
    cap_add:
      - NET_BIND_SERVICE
      - NET_ADMIN
    environment:
      - RUST_LOG=debug

  telemt-redis:
    image: redis:alpine
    container_name: telemt_redis
    ports:
      - "6370:6379"
    volumes:
      - ./redis_data:/data
    restart: always

networks:
  default:
    name: telemt_network
